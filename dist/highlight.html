<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf8" />
    <h1>New Code Editor for NetLogo Web & Derivatives</h1>
  </head>
  <body>
    <!-- Make Editor #2 (new) highlight the new changes compared with Editor1's version (old) -->
    <button name="NextTest" onclick="createSampleChangeSet()">Highlight</button>
    <button name="ToggleAutoAccept" onclick="toggleAutoAccept(isAutoAccept)">Auto Accept</button>
    <div class="editorBody"></div>
    <div id="Container1" style="height: 100vh"></div>
    <!--<div id="Container2" style="height: 40vh"></div> !-->
    <script src="editor.bundle.js"></script>
    <script>
      var isAutoAccept = true;
      function toggleAutoAccept(isAuto) {
        if (isAuto) {
          isAutoAccept = false;
          // change button text
          document.getElementsByName('ToggleAutoAccept')[0].innerHTML = 'Manual Accept';
        } else {
          isAutoAccept = true;
          // change button text
          document.getElementsByName('ToggleAutoAccept')[0].innerHTML = 'Auto Accept';
        }
      }
      var Editor1;
      //var Editor2;
      window.addEventListener('load', function () {
        GalapagosEditor.DebugEnabled = true;
        Editor1 = new GalapagosEditor(document.getElementById('Container1'), {
          ParseMode: 'Normal',
        });
        // Editor2 = new GalapagosEditor(document.getElementById('Container2'), {
        //   ParseMode: 'Normal',
        // });
        // EditorDictionary.Initialize({});
        // Editor1.SetCode('');
        // Editor2.SetCode('');
      });
      function createSampleChangeSet() {
        const placeHolderTr = Editor1.CodeMirror.state.update({
          changes: [
            { from: 0, to: 2 },
            { from: 2, insert: 'wow this is a change' },
            { from: 6, to: 8 },
          ],
        });
        const placeHolderChangeset = placeHolderTr.changes;
        Editor1.Selection.HighlightChanges(placeHolderChangeset, isAutoAccept);
      }
    </script>
  </body>
</html>
